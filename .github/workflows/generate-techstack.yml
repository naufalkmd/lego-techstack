name: Generate Preview Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/generate-techstack.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview manifest
        run: npm run build

      - name: Commit generated output
        run: |
          if [ -z "$(git status --porcelain output)" ]; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output
          git commit -m "chore: regenerate preview manifest"
          git push
